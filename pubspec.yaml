name: patient_care_app
description: A patient companion app - prescription scanning, medicine reminders, appointment alerts, and a safety-first health chatbot.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Notifications & scheduling
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Prescription photo capture + on-device OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  permission_handler: ^11.3.1

  # Networking (for chatbot / AI parsing backend calls)
  http: ^1.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.5
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
     android: true
     ios: true
     image_path: "assets/icon/app_icon.png"
